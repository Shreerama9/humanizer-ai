name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & type-check (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy types-PyYAML pydantic

      - name: Ruff lint
        run: ruff check api/ evaluation/ data/ training/

      - name: Ruff format check
        run: ruff format --check api/ evaluation/ data/ training/

  test:
    name: Unit tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU-only subset)
        run: |
          pip install fastapi pydantic uvicorn httpx pytest pytest-asyncio anyio
          pip install numpy scipy
          # spaCy CPU model (no GPU needed for tests)
          pip install spacy
          python -m spacy download en_core_web_sm

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Skip model loading in tests
          MODEL_PATH: ""

  build-docker:
    name: Docker build (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ui:
    name: Docker build (UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build UI image
        uses: docker/build-push-action@v5
        with:
          context: ui
          file: ui/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
